<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://apis.google.com/js/api.js" async defer></script>
<title>Dana's 12 Week Year Planner</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📅</text></svg>">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;font-size:14px;background:#f8f9fa;color:#1a1a1a;padding:12px;max-width:1200px;margin:0 auto}
:root{--green:#1D9E75;--gd:#0F6E56;--gl:#E1F5EE;--gbg:#F0FBF4;--blue:#2D7DD2;--bbg:#EAF4FF;--amber:#F0A500;--abg:#FFF8EA;--red:#E53E3E;--rbg:#FFF5F5;--bdr:rgba(0,0,0,.1);--bg2:rgba(0,0,0,.04);--t2:rgba(0,0,0,.5);--t3:rgba(0,0,0,.35);--r:10px;--rs:6px}
.nav{display:flex;gap:5px;padding:.875rem 0 1.125rem;border-bottom:1px solid var(--bdr);flex-wrap:wrap}
.nb{padding:7px 14px;font-size:13px;border-radius:var(--rs);border:1px solid var(--bdr);background:#fff;color:var(--t2);cursor:pointer;transition:all .15s;font-weight:500}
.nb:hover{background:var(--bg2)}.nb.active{background:var(--green);color:var(--gl);border-color:var(--gd)}
.page{display:none;padding-top:1.25rem}.page.active{display:block}
.lbl{font-size:11px;font-weight:600;letter-spacing:.07em;color:var(--t3);text-transform:uppercase;margin-bottom:8px}
.card{background:#fff;border:1px solid var(--bdr);border-radius:var(--r);padding:1rem 1.25rem;margin-bottom:10px}
.qc{display:flex;gap:8px;align-items:center;background:#fff;border:1px solid var(--bdr);border-radius:var(--r);padding:.625rem 1rem;margin-bottom:1.25rem;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.qc input{flex:1;background:transparent;border:none;font-size:13px;color:inherit;outline:none}
.qc input::placeholder{color:var(--t3)}
.btn{padding:6px 12px;font-size:12px;border-radius:var(--rs);border:1px solid var(--bdr);background:#fff;cursor:pointer;color:inherit;white-space:nowrap;transition:all .15s}
.btn:hover{background:var(--bg2)}.btn.green{border-color:var(--gd);color:var(--gd)}.btn.asub{border-color:var(--gd);color:var(--gd);background:var(--gbg)}
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.25rem}
.sc{background:var(--bg2);border-radius:var(--rs);padding:.875rem;text-align:center}
.sv{font-size:22px;font-weight:700}.sl{font-size:11px;color:var(--t2);margin-top:2px}
.ws{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:1.25rem}
.wb{min-width:36px;height:36px;padding:0 4px;border-radius:var(--rs);border:1px solid var(--bdr);background:#fff;font-size:11px;cursor:pointer;color:var(--t2);transition:all .15s;display:flex;align-items:center;justify-content:center;font-weight:500}
.wb:hover{background:var(--bg2)}.wb.active{background:var(--green);color:#04342C;border-color:var(--gd);font-weight:700}
.wb.has-p{border-color:var(--green);color:var(--gd)}.wb.w13{border-style:dashed}.wb.plan{border-style:dotted;color:#9B59B6;border-color:#9B59B6}
.tr{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--bdr)}
.tr:last-child{border-bottom:none}
.chk{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--bdr);flex-shrink:0;cursor:pointer;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.chk:hover{border-color:var(--green)}.chk.on{background:var(--green);border-color:var(--gd)}
.chk.on::after{content:'';display:block;width:5px;height:9px;border-right:2.5px solid var(--gl);border-bottom:2.5px solid var(--gl);transform:rotate(45deg) translate(-1px,-2px)}
.tt{font-size:13px;line-height:1.5;flex:1;min-width:0;word-break:break-word}
.tt.done{color:var(--t3);text-decoration:line-through}
.db{font-size:10px;padding:2px 7px;border-radius:20px;border:1px solid var(--bdr);color:var(--t3);flex-shrink:0;white-space:nowrap}
.db.od{border-color:var(--red);color:var(--red);background:var(--rbg)}.db.soon{border-color:var(--amber);color:#7A4F00;background:var(--abg)}
.rb{font-size:10px;padding:2px 7px;border-radius:20px;background:var(--bg2);color:var(--t3);flex-shrink:0;border:1px solid var(--bdr)}
.add-row{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.add-row input,.add-row select{padding:6px 10px;font-size:12px;border-radius:var(--rs);border:1px solid var(--bdr);background:#fff;color:inherit}
.add-row input{flex:1;min-width:100px}.add-row button{padding:6px 12px;font-size:12px;border-radius:var(--rs);border:1px solid var(--bdr);background:#fff;cursor:pointer;white-space:nowrap}
.dtabs{display:flex;gap:4px;margin-bottom:1rem;overflow-x:auto}
.dtab{padding:5px 10px;font-size:12px;border-radius:var(--rs);border:1px solid var(--bdr);background:#fff;cursor:pointer;color:var(--t2);white-space:nowrap;flex-shrink:0;transition:all .15s}
.dtab:hover{background:var(--bg2)}.dtab.active{border-color:rgba(0,0,0,.25);color:inherit;font-weight:500}.dtab.hd{border-color:var(--green);color:var(--gd)}
.tscroll{max-height:520px;overflow-y:auto;border:1px solid var(--bdr);border-radius:var(--r)}
.trow{display:flex;align-items:stretch;min-height:26px;border-bottom:1px solid var(--bdr);position:relative;transition:background .1s}
.trow:last-child{border-bottom:none}.trow.hour{border-top:1px solid rgba(0,0,0,.12)}
.trow.dov{background:var(--gbg)!important;outline:2px dashed var(--green)}
.tlbl{font-size:10px;color:var(--t3);width:62px;flex-shrink:0;padding:4px 6px;display:flex;align-items:center}
.tlbl.oh{font-size:11px;font-weight:500;color:var(--t2)}
.tce{flex:1;padding:3px 8px;display:flex;align-items:center;gap:6px;min-height:26px;cursor:pointer}
.tce:hover{background:var(--bg2)}
.tcell{flex:1;padding:5px 8px;display:flex;align-items:flex-start;gap:6px;flex-direction:column;border-radius:0 3px 3px 0}
.tcell.strategic{background:var(--bbg);color:#1558A8;border-left:3px solid var(--blue)}
.tcell.buffer{background:var(--abg);color:#7A4F00;border-left:3px solid var(--amber)}
.tcell.breakout{background:var(--gbg);color:#155C35;border-left:3px solid var(--green)}
.tcell.general{background:var(--bg2);color:inherit;border-left:3px solid rgba(0,0,0,.2)}
.tcell.mit{background:linear-gradient(135deg,#2D1B69 0%,#4A2C8A 100%);color:#fff;border-left:4px solid #9B59B6}
.btag{font-size:10px;font-weight:600;padding:1px 7px;border-radius:20px;flex-shrink:0}
.strategic .btag{background:var(--blue);color:#fff}.buffer .btag{background:var(--amber);color:#fff}
.breakout .btag{background:var(--green);color:#fff}.general .btag{background:rgba(0,0,0,.15);color:inherit}
.mit .btag{background:#9B59B6;color:#fff;font-size:11px;letter-spacing:.03em}
.stodo{display:flex;align-items:center;gap:6px;padding:3px 6px;background:rgba(255,255,255,.65);border-radius:4px;margin-top:2px;font-size:11px;border:1px solid rgba(0,0,0,.06)}
.schk{width:13px;height:13px;border-radius:3px;border:1.5px solid currentColor;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:.75}
.schk.on{background:currentColor}.schk.on::after{content:'';display:block;width:3px;height:6px;border-right:2px solid #fff;border-bottom:2px solid #fff;transform:rotate(45deg) translate(-1px,-1px)}
.drag-item{display:flex;align-items:center;gap:8px;padding:7px 8px;border:1px solid var(--bdr);border-radius:var(--rs);background:#fff;margin-bottom:5px;cursor:grab;font-size:12px;transition:all .15s}
.drag-item:hover{background:var(--bg2);border-color:rgba(0,0,0,.2)}.drag-item.dragging{opacity:.3}
.dh{font-size:14px;color:var(--t3);user-select:none;flex-shrink:0}
.todo-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--bdr)}
.todo-item:last-child{border-bottom:none}
.gs{background:#fff;border:1px solid var(--bdr);border-radius:var(--r);margin-bottom:8px;overflow:hidden}
.gh{display:flex;align-items:center;gap:10px;padding:.875rem 1rem;cursor:pointer;user-select:none}
.gh:hover{background:var(--bg2)}
.gbadge{width:24px;height:24px;border-radius:50%;background:var(--bg2);border:1px solid var(--bdr);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--t2);flex-shrink:0}
.gbadge.done-g{background:var(--green);color:#fff;border-color:var(--gd)}
.gtitle{font-size:13px;font-weight:500;flex:1;line-height:1.4}
.gtitle.done-g{text-decoration:line-through;color:var(--t3)}
.gpct{font-size:11px;color:var(--t3);margin-right:4px}
.garr{font-size:12px;color:var(--t3);transition:transform .2s}.garr.open{transform:rotate(90deg)}
.gbody{padding:0 1rem .875rem;border-top:1px solid var(--bdr);display:none}.gbody.open{display:block}
.bar-bg{height:4px;background:var(--bg2);border-radius:2px}
.bar-fill{height:4px;background:var(--green);border-radius:2px;transition:width .4s}
.warn{background:var(--rbg);border:1px solid var(--red);border-radius:var(--rs);padding:.625rem .875rem;font-size:12px;color:#C53030;margin-bottom:10px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.info{background:var(--gbg);border:1px solid var(--green);border-radius:var(--rs);padding:.625rem .875rem;font-size:12px;color:var(--gd);margin-bottom:10px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:flex;align-items:center;justify-content:center;padding:1rem}
.modal{background:#fff;border:1px solid var(--bdr);border-radius:var(--r);padding:1.25rem;width:100%;max-width:400px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.2)}
.modal-lg{max-width:540px}
.mt{font-size:15px;font-weight:700;margin-bottom:4px}.ms{font-size:12px;color:var(--t2);margin-bottom:1rem}
.btype-btn{width:100%;padding:10px 14px;border-radius:var(--rs);border:1px solid var(--bdr);background:#fff;cursor:pointer;text-align:left;margin-bottom:6px;transition:all .15s}
.btype-btn:hover{border-color:rgba(0,0,0,.25);background:var(--bg2)}
.btype-btn.strategic{border-left:4px solid var(--blue)}.btype-btn.buffer{border-left:4px solid var(--amber)}
.btype-btn.breakout{border-left:4px solid var(--green)}.btype-btn.general{border-left:4px solid rgba(0,0,0,.2)}
.btype-btn.mit{border-left:4px solid #9B59B6;background:linear-gradient(135deg,rgba(45,27,105,.05),rgba(74,44,138,.08))}
.bt-name{font-size:13px;font-weight:600}.bt-desc{font-size:11px;color:var(--t2);margin-top:2px}
.minp{width:100%;padding:8px 10px;font-size:13px;border-radius:var(--rs);border:1px solid var(--bdr);background:#fff;color:inherit;margin-bottom:8px;font-family:inherit}
.minp:focus{outline:none;border-color:var(--green)}
.mrow{display:flex;gap:8px;margin-bottom:8px}
.mrow select,.mrow input{flex:1;padding:7px 10px;font-size:12px;border-radius:var(--rs);border:1px solid var(--bdr);background:#fff;color:inherit}
.flbl{font-size:11px;font-weight:500;color:var(--t2);margin-bottom:4px;margin-top:8px;display:block}
.mfooter{display:flex;gap:8px;justify-content:flex-end;margin-top:10px}
.mfooter button{padding:7px 16px;font-size:13px;border-radius:var(--rs);border:1px solid var(--bdr);background:#fff;cursor:pointer}
.mfooter .primary{background:var(--green);color:var(--gl);border-color:var(--gd)}
.cel{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;pointer-events:none}
.cel-msg{font-size:28px;font-weight:800;color:var(--green);text-align:center;animation:popIn .5s cubic-bezier(.17,.67,.35,1.3) forwards,fadeOut .8s ease 3.5s forwards;opacity:0;text-shadow:0 2px 20px rgba(29,158,117,.3);padding:1rem 1.5rem;background:rgba(255,255,255,.95);border-radius:var(--r);border:2px solid var(--green);max-width:80vw}
@keyframes popIn{0%{transform:scale(.4);opacity:0}60%{transform:scale(1.1);opacity:1}100%{transform:scale(1);opacity:1}}
@keyframes fadeOut{0%{opacity:1}100%{opacity:0}}
.confp{position:fixed;border-radius:2px;animation:fall var(--dur) ease-in forwards}
@keyframes fall{0%{transform:translateY(-30px) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--green);color:var(--gl);padding:8px 18px;border-radius:var(--rs);font-size:13px;opacity:0;transition:opacity .2s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.rpct{font-size:72px;font-weight:800;line-height:1;text-align:center;margin:1rem 0 .5rem}
.rpct.great{color:var(--green)}.rpct.ok{color:var(--amber)}.rpct.low{color:var(--red)}
.rq{font-size:13px;font-weight:600;margin-bottom:6px;margin-top:1rem}
.rta{width:100%;padding:8px 10px;font-size:13px;border-radius:var(--rs);border:1px solid var(--bdr);background:#fff;color:inherit;resize:vertical;min-height:60px;font-family:inherit}
.rta:focus{outline:none;border-color:var(--green)}
.tpl-card{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--rs);padding:.75rem 1rem;margin-bottom:8px;display:flex;align-items:center;gap:10px}
.win-item{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px solid var(--bdr)}
.win-item:last-child{border-bottom:none}
.vi{font-size:13px;color:var(--t2);line-height:1.9}
.empty{padding:1rem;text-align:center;color:var(--t3);font-size:12px}
.period-badge{font-size:11px;padding:2px 8px;border-radius:20px;background:var(--bg2);border:1px solid var(--bdr);color:var(--t2);margin-left:8px}
.pri-pill{font-size:10px;padding:2px 8px;border-radius:20px;border:1px solid;flex-shrink:0;cursor:pointer;white-space:nowrap}
.pri-pill.p1{border-color:var(--red);color:var(--red);background:var(--rbg);font-weight:700}
.pri-pill.p2{border-color:#E07B39;color:#C05A1F;background:#FFF2EC}
.pri-pill.p3{border-color:var(--amber);color:#7A4F00;background:var(--abg)}
.pri-pill.p4{border-color:#7DB87D;color:#2D6B2D;background:#F0FFF0}
.pri-pill.p5{border-color:var(--bdr);color:var(--t3);background:var(--bg2)}

.streak-badge{display:inline-flex;align-items:center;gap:6px;background:linear-gradient(135deg,#FF6B35,#F0A500);color:#fff;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700}
.one-thing-box{background:linear-gradient(135deg,var(--gbg),#E8F8F2);border:2px solid var(--green);border-radius:var(--r);padding:1rem 1.25rem;margin-bottom:1.25rem}
.one-thing-input{width:100%;background:transparent;border:none;font-size:16px;font-weight:600;color:var(--gd);outline:none;placeholder-color:var(--t3)}
.habit-grid{display:grid;gap:3px}
.habit-cell{width:18px;height:18px;border-radius:3px;border:1px solid var(--bdr);background:var(--bg2);cursor:default;transition:background .2s}
.habit-cell.done{background:var(--green);border-color:var(--gd)}
.habit-cell.today{outline:2px solid var(--amber);outline-offset:1px}
.brain-dump-area{width:100%;min-height:400px;padding:1.25rem;font-size:15px;line-height:1.8;border:1px solid var(--bdr);border-radius:var(--r);background:#fff;resize:vertical;font-family:inherit;color:inherit}
.brain-dump-area:focus{outline:none;border-color:var(--green)}
.day-wins-item{display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:1px solid var(--bdr)}
.day-wins-item:last-child{border-bottom:none}

/* Mobile responsive */
@media(max-width:700px){
  .two-col{grid-template-columns:1fr!important}
  .stat-row{grid-template-columns:repeat(3,1fr)}
  .nav{gap:4px}
  .nb{padding:5px 10px;font-size:12px}
  body{padding:8px}
  .ws{gap:4px}
  .wb{width:30px;height:30px;font-size:11px}
  .dtabs{gap:3px}
  .dtab{padding:4px 8px;font-size:11px}
  .modal{width:95vw;max-width:95vw!important}
  .one-thing-box{padding:.75rem 1rem}
  .one-thing-input{font-size:14px}
  .tscroll{max-height:360px}
  .brain-dump-area{min-height:280px;font-size:14px}
  .rpct{font-size:52px}
  .two-col[style*="grid-template-columns:1fr 1fr"]{grid-template-columns:1fr!important}
}
@media(max-width:480px){
  .stat-row{grid-template-columns:repeat(3,1fr);gap:6px}
  .sv{font-size:18px}
  .nb{padding:5px 8px;font-size:11px}
}

/* Auth */
.auth-overlay{position:fixed;inset:0;background:linear-gradient(135deg,#0F6E56,#1D9E75);z-index:500;display:flex;align-items:center;justify-content:center;padding:2rem}
.auth-card{background:#fff;border-radius:16px;padding:2rem;max-width:380px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.auth-logo{font-size:48px;margin-bottom:1rem}
.auth-title{font-size:22px;font-weight:800;color:#1a1a1a;margin-bottom:.5rem}
.auth-sub{font-size:14px;color:var(--t2);margin-bottom:1.5rem;line-height:1.6}
.auth-btn{display:inline-flex;align-items:center;gap:10px;background:#fff;border:2px solid var(--bdr);border-radius:8px;padding:12px 20px;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;width:100%;justify-content:center}
.auth-btn:hover{border-color:var(--green);background:var(--gbg)}
.auth-btn img{width:20px;height:20px}
.user-bar{display:flex;align-items:center;gap:8px;padding:.5rem .75rem;background:var(--gbg);border-radius:var(--rs);border:1px solid rgba(29,158,117,.2);margin-bottom:.75rem;font-size:12px}
.user-avatar{width:24px;height:24px;border-radius:50%;object-fit:cover}
.sync-status{font-size:11px;color:var(--gd);margin-left:auto;cursor:pointer}
.sync-status.syncing{color:var(--amber)}
.sync-status.error{color:var(--red)}
/* Cal panel */
.cal-panel{position:fixed;right:0;top:0;bottom:0;width:320px;background:#fff;border-left:1px solid var(--bdr);z-index:90;transform:translateX(100%);transition:transform .3s;overflow-y:auto;padding:1rem;box-shadow:-4px 0 20px rgba(0,0,0,.1)}
.cal-panel.open{transform:translateX(0)}
.cal-event{display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:1px solid var(--bdr);font-size:12px}
.cal-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:3px}
</style>
</head>
<body>

<div id="toast-el" class="toast"></div>
<div id="modal-ct"></div>
<div id="cel-ct"></div>


<!-- Auth overlay -->
<div id="auth-overlay" class="auth-overlay">
  <div class="auth-card">
    <div class="auth-logo">📅</div>
    <div class="auth-title">12 Week Year Planner</div>
    <div class="auth-sub">Sign in with Google to access your planner, sync your calendars, and save your data across all devices.</div>
    <button class="auth-btn" onclick="signIn()">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
      Sign in with Google
    </button>
    <div style="font-size:11px;color:var(--t3);margin-top:1rem">Your data is stored in your own Google Drive. We never see it.</div>
  </div>
</div>

<!-- Calendar side panel -->
<div id="cal-panel" class="cal-panel">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem">
    <div style="font-size:14px;font-weight:700">Google Calendars</div>
    <button onclick="toggleCalPanel()" style="background:none;border:none;cursor:pointer;font-size:18px;color:var(--t3)">×</button>
  </div>
  <div id="cal-panel-content"></div>
</div>
<div id="user-bar" style="display:none" class="user-bar">
  <img id="user-avatar" class="user-avatar" src="" alt="">
  <span id="user-name" style="font-weight:500"></span>
  <span id="sync-status" class="sync-status" onclick="manualSync()">● Synced</span>
  <button onclick="toggleCalPanel()" style="background:none;border:none;cursor:pointer;font-size:11px;color:var(--gd);padding:0 4px">📅 Calendars</button>
  <button onclick="signOut()" style="background:none;border:none;cursor:pointer;font-size:11px;color:var(--t3);padding:0 4px;margin-left:auto">Sign out</button>
</div>
<div class="qc" style="margin-top:.5rem">
  <span style="font-size:16px">⚡</span>
  <input type="text" id="qc-inp" placeholder="Quick capture — type anything, hit Enter to save to To-Dos…" onkeydown="if(event.key==='Enter')quickCapture()">

<script>
// ── CONSTANTS ────────────────────────────────────────────────
const BTYPES={mit:{label:'MIT',desc:'Most Important Thing · Protected focused time',slots:4},strategic:{label:'Strategic',desc:'3 hrs · High-impact focused work',slots:12},buffer:{label:'Buffer',desc:'60 min · Admin & to-do tasks',slots:4},breakout:{label:'Breakout',desc:'3 hrs · Non-work rest & recharge',slots:12},general:{label:'General',desc:'Any duration · Meetings, activities, events',slots:2}};
const SLOTS=[];
for(let h=0;h<24;h++)for(let m=0;m<60;m+=15){const ap=h<12?'AM':'PM';const hr=h===0?12:h>12?h-12:h;SLOTS.push({label:`${hr}:${m.toString().padStart(2,'0')} ${ap}`,isHour:m===0});}
const DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const DS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const ENC=['Great work — keep the momentum! 💪','Progress, not perfection. Keep going! 🚀','Every tactic completed is a step toward your vision. ✨','You\'re building habits that last. 🌱','Small wins add up to big results. 🎯','Consistency is the key. You\'ve got this! 🔑','Your future self is grateful. 💛','One step at a time. You\'re doing great! 🌟','Discipline today = freedom tomorrow. ⚡','Stay the course — you\'re closer than you think. 🏁','God\'s got this. Trust the process. 🙏','You showed up today — that matters. 👊'];

const DEFAULT_GOALS=["Get house plans finished.","Get will done.","Date night with Kayla once a month.","At least 1 couple over to house once a month.","Plan summer international mission trip.","Continue to disciple the kids each week.","Plan a whole family fun activity at least once a month.","Read 6 books: 2 spiritual, 2 fiction, 2 non-fiction.","Raise $10M in the Refuge Impact Fund.","Have all rentals losing ≤$5k/month.","Out for breakfast with one kid per week (Fridays).","At least 3x daily prayer: morning, midday, evening.","Get Refuge Acres completely funded.","Clear out small trees in new backyard."];

// ── PERIOD HELPERS

function seasonName(date) {
  const d = new Date(date);
  const m = d.getMonth(); // 0-11
  const y = d.getFullYear();
  if (m <= 2) return `Winter ${y}`;
  if (m <= 5) return `Spring ${y}`;
  if (m <= 8) return `Summer ${y}`;
  return `Fall ${y}`;
}
// A period has: id, name, startDate(ms), hasPlanWeek, goals[], tactics[], wc{}, blocks{}, reviews{}, intentions{}, wins[], goalsDone[]
// Week indices: hasPlanWeek ? 0=Planning, 1-12=active, 13=Rest&Refresh : 1-12=active, 13=Rest&Refresh
// Total weeks: hasPlanWeek ? 14 : 13

function periodWeekCount(p){return p.hasPlanWeek?14:13;}
function periodWeekLabel(p,w){
  if(p.hasPlanWeek){if(w===0)return'Planning';if(w===13)return'Rest & Refresh';return`Week ${w}`;}
  else{if(w===13)return'Rest & Refresh';return`Week ${w}`;}
}
function periodWeekStart(p,w){
  const base=new Date(p.startDate);
  const offset=p.hasPlanWeek?w:w; // week 0 = planning = offset 0
  const d=new Date(base);d.setDate(d.getDate()+offset*7);return d;
}
function nowPeriodWeek(p){
  const today=new Date();today.setHours(0,0,0,0);
  const base=new Date(p.startDate);
  const diff=Math.floor((today-base)/(7*24*3600*1000));
  const max=periodWeekCount(p)-1;
  return Math.max(0,Math.min(max,diff));
}

// ── DATA ─────────────────────────────────────────────────────
const SK='dana_12wy_v10';
function ld(){
  try{const r=localStorage.getItem(SK);if(r)return JSON.parse(r);}catch(e){}
  const firstPeriod=createPeriod(seasonName(new Date(2026,3,5)),new Date(2026,3,5),false);
  firstPeriod.goals=[...DEFAULT_GOALS];
  return{activePeriodId:firstPeriod.id,periods:[firstPeriod],todos:[],someday:[],templates:[],brainDump:'',oneThings:{},streakCache:{}};
}
function createPeriod(name,startDate,hasPlanWeek){
  return{id:'p-'+Date.now(),name,startDate:new Date(startDate).setHours(0,0,0,0),hasPlanWeek,goals:[...DEFAULT_GOALS],tactics:[],wc:{},blocks:{},reviews:{},intentions:{},wins:[],goalsDone:[]};
}
function sv(){try{localStorage.setItem(SK,JSON.stringify(D));}catch(e){}}
let D=ld();
if(!D.todos)D.todos=[];if(!D.someday)D.someday=[];if(!D.templates)D.templates=[];if(!D.brainDump)D.brainDump='';if(!D.oneThings)D.oneThings={};if(!D.streakCache)D.streakCache={};
if(!D.periods||!D.periods.length){const fp=createPeriod('Period 1',new Date(2026,3,5),false);fp.goals=[...DEFAULT_GOALS];D.periods=[fp];D.activePeriodId=fp.id;}

function AP(){return D.periods.find(p=>p.id===D.activePeriodId)||D.periods[D.periods.length-1];}

// Current week/day state per period
if(!D.curWeek)D.curWeek={};if(!D.curDay)D.curDay={};
function getCW(){return D.curWeek[AP().id]??nowPeriodWeek(AP());}
function getCD(){return D.curDay[AP().id]??new Date().getDay();}
function setCW(w){D.curWeek[AP().id]=w;sv();}
function setCD(d){D.curDay[AP().id]=d;sv();}

function wstart(w){return periodWeekStart(AP(),w);}
function ddate(w,d){const s=wstart(w);const dd=new Date(s);dd.setDate(dd.getDate()+d);return dd;}
function fd(d){return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});}
function ff(d){return d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});}

// ── TACTIC HELPERS ───────────────────────────────────────────
function tacsForWeek(p,w){
  return p.tactics.filter(t=>{
    if(t.rec==='onetime')return t.dueWeek===w||t.carriedTo===w;
    if(t.rec==='weekly')return true;
    if(t.rec==='daily')return true;
    if(t.rec==='ongoing')return true;
    return false;
  });
}
function tacsForDay(p,w,d){
  return p.tactics.filter(t=>{
    if(t.rec==='onetime')return t.dueWeek===w||t.carriedTo===w;
    if(t.rec==='weekly')return t.dow===d;
    if(t.rec==='daily')return true;
    if(t.rec==='ongoing')return true;
    return false;
  });
}
function ck(tid,w,d){return`${tid}_${w}_${d}`;}
function isChk(p,tid,w,d){return!!(p.wc[ck(tid,w,d)]);}
function setChk(p,tid,w,d,v){p.wc[ck(tid,w,d)]=v;sv();}
function tacDoneInWeek(p,tid,w){for(let d=0;d<7;d++)if(isChk(p,tid,w,d))return true;return false;}

function weekScore(p,w){
  const tacs=tacsForWeek(p,w);if(!tacs.length)return 0;
  let done=0;
  tacs.forEach(t=>{
    if(t.rec==='onetime'){if(tacDoneInWeek(p,t.id,w))done++;}
    else if(t.rec==='weekly'){if(isChk(p,t.id,w,t.dow))done++;}
    else if(t.rec==='daily'){let ok=true;for(let d=0;d<7;d++)if(!isChk(p,t.id,w,d)){ok=false;break;}if(ok)done++;}
    else if(t.rec==='ongoing'){if(tacDoneInWeek(p,t.id,w))done++;}
  });
  return Math.round(done/tacs.length*100);
}
function overallScore(p){
  let t=0,dn=0;
  const wc=periodWeekCount(p);
  for(let w=0;w<wc;w++){const tacs=tacsForWeek(p,w);t+=tacs.length;tacs.forEach(tc=>{if(tc.rec==='onetime'&&tacDoneInWeek(p,tc.id,w))dn++;else if(tc.rec==='weekly'&&isChk(p,tc.id,w,tc.dow))dn++;else if(tc.rec==='daily'){let ok=true;for(let d=0;d<7;d++)if(!isChk(p,tc.id,w,d)){ok=false;break;}if(ok)dn++;}else if(tc.rec==='ongoing'&&tacDoneInWeek(p,tc.id,w))dn++;});}
  return t?Math.round(dn/t*100):0;
}
function goalScore(p,gi){
  const tacs=p.tactics.filter(t=>t.gi===gi&&t.rec==='onetime');
  if(!tacs.length)return 0;
  const done=tacs.filter(t=>{const wc=periodWeekCount(p);for(let w=0;w<wc;w++)if(tacDoneInWeek(p,t.id,w))return true;return false;});
  return Math.round(done.length/tacs.length*100);
}
function getDayBlocks(w,d){const p=AP();return(p.blocks[w]&&p.blocks[w][d])||[];}
function setDayBlocks(w,d,arr){const p=AP();if(!p.blocks[w])p.blocks[w]={};p.blocks[w][d]=arr;sv();}
function activeTodos(){return D.todos.filter(t=>!t.done);}
function sortTodos(arr){return arr.slice().sort(function(a,b){return(parseInt(a.pri)||3)-(parseInt(b.pri)||3);});}
function randEnc(){return ENC[Math.floor(Math.random()*ENC.length)];}
function toast(msg){const el=document.getElementById('toast-el');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2600);}
function celebrate(msg){
  const c=document.getElementById('cel-ct');
  const cols=['#1D9E75','#2D7DD2','#F0A500','#E53E3E','#9B59B6','#27AE60','#E67E22','#3498DB'];
  let html=`<div class="cel"><div class="cel-msg">${msg}</div></div>`;
  for(let i=0;i<32;i++){const col=cols[i%cols.length];const l=Math.random()*100;const delay=Math.random()*.7;const sz=6+Math.random()*10;const dur=2+Math.random()*1.5;html+=`<div class="confp" style="left:${l}%;background:${col};width:${sz}px;height:${sz}px;animation-delay:${delay}s;--dur:${dur}s"></div>`;}
  c.innerHTML=html;setTimeout(()=>{c.innerHTML='';},5500);
}
let dragId=null,dragType=null;

// ── QUICK CAPTURE ────────────────────────────────────────────
function quickCapture(){
  const inp=document.getElementById('qc-inp');const pri=document.getElementById('qc-pri').value;
  const text=inp.value.trim();if(!text)return;
  D.todos.push({id:'td-'+Date.now(),text,pri,done:false,sr:[]});sv();inp.value='';
  toast('Captured! ✓');
}

function showPage(p,btn){
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.nb').forEach(el=>el.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  if(btn)btn.classList.add('active');
  ({today:rToday,todos:rTodos,week:rWeek,review:rReview,bigpicture:rBigPicture,masterplan:rMasterPlan,archives:rArchives,braindump:rBrainDump,habits:rHabits})[p]();
}

// ── TODAY ────────────────────────────────────────────────────

// ── STREAK ────────────────────────────────────────────────────
function calcStreak(){
  const p=AP();const cw=getCW();
  let streak=0;
  for(let w=cw;w>=1;w--){
    if(weekScore(p,w)>=85)streak++;
    else break;
  }
  return streak;
}
function streakHtml(){
  const s=calcStreak();
  if(s===0)return'';
  const fire=s>=4?'🔥🔥':s>=2?'🔥':'⚡';
  return'<span class="streak-badge">'+fire+' '+s+' week streak!</span>';
}

// ── QUOTE OF THE WEEK ─────────────────────────────────────────
function weeklyQuote(){
  const items=D.aspirationalVision||[];
  const active=items.filter(function(v){return !v.done&&typeof v==='object';});
  const pool=active.length?active:items;
  if(!pool.length)return'';
  const p=AP();const cw=getCW();
  // Deterministic pick based on week number so it stays consistent all week
  const idx=(cw-1)%pool.length;
  const item=pool[idx];
  return typeof item==='string'?item:(item.text||'');
}

// ── ONE THING ─────────────────────────────────────────────────
function getOneThing(){
  const key=AP().id+'_'+getCW()+'_'+getCD();
  return D.oneThings[key]||'';
}
function saveOneThing(val){
  const key=AP().id+'_'+getCW()+'_'+getCD();
  D.oneThings[key]=val;sv();
}

// ── DAY ACCOMPLISHMENTS ───────────────────────────────────────
function getDayAccomplishments(w,d){
  const p=AP();
  const results=[];
  // Checked tactics
  tacsForDay(p,w,d).forEach(function(t){
    if(isChk(p,t.id,w,d))results.push({type:'tactic',text:t.text});
  });
  // Completed todos (checked off in any block this day)
  getDayBlocks(w,d).forEach(function(b){
    (b.sts||[]).forEach(function(raw){
      if(!raw.startsWith('tac:')){
        const td=D.todos.find(function(t){return t.id===raw;});
        if(td&&td.done)results.push({type:'todo',text:td.text});
      }
    });
  });
  return results;
}

// ── HABIT TRACKER DATA ────────────────────────────────────────
function getHabitData(){
  const p=AP();const cw=getCW();
  // Get recurring tactics (daily + weekly)
  const recurring=p.tactics.filter(function(t){return t.rec==='daily'||t.rec==='weekly';});
  // Build 8-week x tactic grid
  const startW=Math.max(1,cw-7);
  const weeks=[];
  for(let w=startW;w<=cw;w++)weeks.push(w);
  return{tactics:recurring,weeks:weeks};
}

// ── ENHANCED CELEBRATE ────────────────────────────────────────
const _origCelebrate=celebrate;
function celebrateWeekScore(score,w){
  if(score>=100){
    bigCelebrate('💯 Perfect week! '+randEnc());
  } else if(score>=85){
    const s=calcStreak();
    if(s>=2)bigCelebrate('🔥 '+s+'-week streak! '+randEnc());
    else celebrate('✓ 85%+ this week! '+randEnc());
  }
}
function bigCelebrate(msg){
  const c=document.getElementById('cel-ct');
  const cols=['#1D9E75','#2D7DD2','#F0A500','#E53E3E','#9B59B6','#27AE60','#E67E22','#3498DB'];
  let html='<div class="cel"><div class="cel-msg" style="font-size:36px;padding:1.5rem 2rem">'+msg+'</div></div>';
  for(let i=0;i<60;i++){
    const col=cols[i%cols.length];const l=Math.random()*100;
    const delay=Math.random()*.8;const sz=5+Math.random()*12;const dur=2.5+Math.random()*2;
    html+='<div class="confp" style="left:'+l+'%;background:'+col+';width:'+sz+'px;height:'+sz+'px;animation-delay:'+delay+'s;--dur:'+dur+'s"></div>';
  }
  c.innerHTML=html;setTimeout(function(){c.innerHTML='';},6000);
}
function rToday(){
  const p=AP();
  const realW=nowPeriodWeek(p);
  const realD=new Date().getDay();
  // Always auto-advance to real date on Today tab
  if(D.curWeek[p.id]===undefined||D.curWeek[p.id]===null||realW!==getCW()){setCW(realW);}
  setCD(realD); // Today tab always shows the actual current day
  const w=getCW();const d=getCD();
  const blocks=getDayBlocks(w,d);
  const dayTacs=tacsForDay(p,w,d);
  const pending=activeTodos();
  const high=pending.filter(function(t){return parseInt(t.pri||3)<=2;});
  const topTodos=sortTodos(high.length?high:pending).slice(0,5);
  const wlabel=periodWeekLabel(p,w);
  const intention=p.intentions[w]||'';
  const oneThing=getOneThing();
  const streak=calcStreak();
  const quote=weeklyQuote();
  const accomplishments=getDayAccomplishments(w,d);

  let advNudge='';
  if(realW!==w)advNudge='<div class="warn">📅 Real date puts you in '+periodWeekLabel(p,realW)+'. <button class="btn" style="margin-left:8px;font-size:11px;padding:3px 10px" onclick="goRealWeek()">Go to '+periodWeekLabel(p,realW)+'</button></div>';

  // Build today's schedule: time blocks + cal events sorted by time
  const schedItems=[];
  blocks.forEach(function(b){
    const dur=(b.e-b.s)*15;const dh=Math.floor(dur/60),dm=dur%60;
    const ds=dh>0?(dm?dh+'h '+dm+'m':dh+'h'):dm+'m';
    const col=b.t==='strategic'?'var(--blue)':b.t==='buffer'?'var(--amber)':b.t==='breakout'?'var(--green)':b.t==='mit'?'#9B59B6':'rgba(0,0,0,.2)';
    const bg=b.t==='strategic'?'var(--bbg)':b.t==='buffer'?'var(--abg)':b.t==='breakout'?'var(--gbg)':b.t==='mit'?'linear-gradient(135deg,#2D1B69,#4A2C8A)':'var(--bg2)';
    const mitC=b.t==='mit'?'color:#fff;':'';
    let sub='';
    (b.sts||[]).forEach(function(raw){
      if(raw.startsWith('tac:')){const tac=p.tactics.find(function(t){return t.id===raw.slice(4);});if(tac)sub+='<div style="font-size:11px;padding:1px 0 1px 8px;border-left:2px solid '+col+';'+(b.t==='mit'?'color:rgba(255,255,255,.85)':'color:var(--t2)')+'">• '+tac.text+'</div>';}
      else{const td=D.todos.find(function(t){return t.id===raw;});if(td&&!td.done)sub+='<div style="font-size:11px;padding:1px 0 1px 8px;border-left:2px solid '+col+';color:var(--t2)">• '+td.text+'</div>';}
    });
    schedItems.push({sk:b.s*15, html:'<div style="border-radius:6px;padding:5px 8px;margin-bottom:3px;background:'+bg+';border-left:3px solid '+col+';'+mitC+'">'
      +'<div style="display:flex;align-items:center;gap:6px">'
        +'<span style="font-size:10px;font-weight:700;padding:1px 6px;border-radius:20px;background:'+col+';color:#fff;flex-shrink:0">'+BTYPES[b.t].label+'</span>'
        +'<span style="font-size:12px;font-weight:500;flex:1;'+mitC+'">'+b.title+'</span>'
        +'<span style="font-size:11px;opacity:.7;'+mitC+'">'+SLOTS[b.s].label+' · '+ds+'</span>'
      +'</div>'+sub+'</div>'});
  });
  if(D.calEvents&&D.calEvents[w]&&D.calEvents[w][d]){
    D.calEvents[w][d].forEach(function(ev){
      const startDt=new Date(ev.start);
      const sk=ev.allDay?-1:startDt.getHours()*60+startDt.getMinutes();
      const ts=ev.allDay?'All day':startDt.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
      const te=ev.end&&!ev.allDay?' – '+new Date(ev.end).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}):'';
      schedItems.push({sk:sk, html:'<div style="border-radius:6px;padding:5px 8px;margin-bottom:3px;background:#fff;border-left:3px solid '+ev.color+';border:1px solid var(--bdr);display:flex;align-items:center;gap:6px">'
        +'<span style="width:8px;height:8px;border-radius:50%;background:'+ev.color+';flex-shrink:0"></span>'
        +'<span style="font-size:12px;font-weight:500;flex:1">'+ev.title+'</span>'
        +'<span style="font-size:11px;color:var(--t3)">'+ts+te+'</span>'
      +'</div>'});
    });
  }
  schedItems.sort(function(a,b){return a.sk-b.sk;});
  let tlHtml=schedItems.map(function(i){return i.html;}).join('');
  if(!tlHtml)tlHtml='<div style="color:var(--t3);font-size:12px;padding:.5rem 0">No blocks or events today — go to This Week → Daily Planner to plan your day.</div>';

  document.getElementById('page-today').innerHTML=
    advNudge

    // Quote of the week banner
    +(quote?'<div style="background:linear-gradient(135deg,#1D9E75,#0F6E56);color:#fff;border-radius:var(--r);padding:.875rem 1.25rem;margin-bottom:1.25rem;font-size:13px;line-height:1.6">'
      +'<div style="font-size:10px;font-weight:700;letter-spacing:.07em;opacity:.7;margin-bottom:4px">VISION OF THE WEEK</div>'
      +'<div style="font-style:italic;font-size:14px">"'+quote+'"</div>'
    +'</div>':'')

    // Header row with streak
    +'<div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px">'
      +'<div>'
        +'<div style="font-size:22px;font-weight:800">'+DAYS[d]+'</div>'
        +'<div style="font-size:13px;color:var(--t2)">'+ff(ddate(w,d))+' · <strong>'+wlabel+'</strong> of '+p.name+'</div>'
      +'</div>'
      +'<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">'
        +(streak>0?streakHtml():'')
        +'<div style="display:flex;gap:5px;">'+DS.map(function(dy,i){return'<button class="dtab '+(i===d?'active':'')+'" onclick="setTodayDay('+i+')">'+dy+'</button>';}).join('')+'</div>'
      +'</div>'
    +'</div>'

    // ONE THING
    +'<div class="one-thing-box">'
      +'<div style="font-size:10px;font-weight:700;letter-spacing:.07em;color:var(--gd);margin-bottom:6px">🎯 THE ONE THING TODAY</div>'
      +'<input class="one-thing-input" type="text" id="one-thing-inp" value="'+oneThing+'" placeholder="What is the single most important thing today?" onchange="saveOneThing(this.value)" onblur="saveOneThing(this.value)">'
      +(oneThing?'<div style="margin-top:8px"><button class="btn" style="font-size:11px;background:var(--green);color:#fff;border-color:var(--gd)" onclick="completeOneThing()">✓ Mark done</button></div>':'')
    +'</div>'

    // Stats row

function rDayPlan(){
  const p=AP();const w=getCW();const d=getCD();
  const blocks=getDayBlocks(w,d);
  const dayTacs=tacsForDay(p,w,d);
  const occ={};blocks.forEach((b,bi)=>{for(let s=b.s;s<b.e;s++)occ[s]=bi;});
  // Pre-process calendar events into slot map
  const calSlots={};
  if(D.calEvents&&D.calEvents[w]&&D.calEvents[w][d]){
    D.calEvents[w][d].forEach(function(ev){
      if(ev.allDay)return;
      const start=new Date(ev.start);const end=ev.end?new Date(ev.end):new Date(start.getTime()+30*60000);
      const sSlot=Math.floor((start.getHours()*60+start.getMinutes())/15);
      const eSlot=Math.ceil((end.getHours()*60+end.getMinutes())/15);
      if(sSlot>=0&&sSlot<SLOTS.length&&!calSlots[sSlot]){
        calSlots[sSlot]={ev,eSlot};
      }
    });
  }
  let grid='';let skip=-1;
  for(let i=0;i<SLOTS.length;i++){
    const sl=SLOTS[i];if(i<skip)continue;
    const bi=occ[i];
    if(bi!==undefined){
      const b=blocks[bi];const dur=(b.e-b.s)*15;const dh=Math.floor(dur/60),dm=dur%60;const ds=dh>0?(dm?`${dh}h ${dm}m`:`${dh}h`):`${dm}m`;
      const stodos=(b.sts||[]).map(raw=>{
        if(raw.startsWith('tac:')){const tid=raw.slice(4);const tac=p.tactics.find(t=>t.id===tid);if(!tac)return'';const done=isChk(p,tid,w,d);return`<div class="stodo"><div class="schk ${done?'on':''}" onclick="togTDay(this,'${tid}',${w},${d})"></div><span style="${done?'text-decoration:line-through;opacity:.5':''}flex:1">${tac.text}</span><span onclick="rmFromSlot('${raw}',${w},${d},${bi})" style="cursor:pointer;opacity:.4;font-size:13px;margin-left:4px">×</span></div>`;}
        const td=D.todos.find(t=>t.id===raw);if(!td)return'';

// Check previous day for incomplete tactics/todos and surface them
function getCarriedItems(w, d) {
  const p = AP();
  const carried = {tactics: [], todos: []};
  // Previous day
  let pw = w, pd = d - 1;
  if (pd < 0) { pd = 6; pw = w - 1; }
  if (pw < 1) return carried;
  const prevBlocks = getDayBlocks(pw, pd);
  prevBlocks.forEach(function(b) {
    (b.sts || []).forEach(function(raw) {
      if (raw.startsWith('tac:')) {
        const tid = raw.slice(4);
        const tac = p.tactics.find(function(t) { return t.id === tid; });
        if (tac && !isChk(p, tid, pw, pd)) carried.tactics.push(tac);
      } else {
        const td = D.todos.find(function(t) { return t.id === raw; });
        if (td && !td.done) carried.todos.push(td);
      }
    });
  });
  return carried;
}
function onTDStart(e,id){dragId=id;dragType='todo';e.dataTransfer.setData('text/plain','todo:'+id);e.dataTransfer.effectAllowed='copy';}
function handleTacDragStart(e){const id=e.currentTarget.dataset.tid;if(id)onTacStart(e,id);}
function onTacStart(e,id){dragId=id;dragType='tactic';e.dataTransfer.setData('text/plain','tac:'+id);e.dataTransfer.effectAllowed='copy';}
function onDO(e,si){e.preventDefault();e.dataTransfer.dropEffect='copy';document.querySelectorAll('.trow').forEach(r=>r.classList.remove('dov'));document.getElementById('sr-'+si)?.classList.add('dov');}
function onDL(e){e.currentTarget.classList.remove('dov');}
function onDrop(e,w,d,si){
  e.preventDefault();document.querySelectorAll('.trow').forEach(r=>r.classList.remove('dov'));
  const raw=e.dataTransfer.getData('text/plain');
  const isTac=raw.startsWith('tac:');const isTodo=raw.startsWith('todo:');
  const id=raw.split(':').slice(1).join(':')||dragId;if(!id)return;
  const blocks=getDayBlocks(w,d);
  let block=blocks.find(b=>si>=b.s&&si<b.e);
  // If no block exists at this slot, auto-create a General block
  if(!block){
    const newBlock={t:'general',title:'General',s:si,e:si+2,sts:[],rec:false};
    const overlap=blocks.some(b=>si<b.e&&(si+2)>b.s);
    if(!overlap){blocks.push(newBlock);blocks.sort((a,bb)=>a.s-bb.s);setDayBlocks(w,d,blocks);block=blocks.find(b=>si>=b.s&&si<b.e);}
    else{toast('No room to create a block here — drop on an existing block.');return;}
  }
  if(!block.sts)block.sts=[];
  const slotKey=isTac?'tac:'+id:id;
  if(block.sts.includes(slotKey)){toast('Already in this block.');return;}
  if(isTodo){
    const todo=D.todos.find(t=>t.id===id);if(!todo||todo.done)return;
    block.sts.push(id);if(!todo.sr)todo.sr=[];todo.sr.push({w,d,bs:block.s});
  } else if(isTac){
    block.sts.push('tac:'+id);
  }
  setDayBlocks(w,d,blocks);sv();rDayPlan();toast(isTac?'Tactic added to block ✓':'To-do added to block ✓ (stays on list until checked off)');
  dragId=null;dragType=null;
}
function compSTodo(id,w,d,bi,el){
  const todo=D.todos.find(t=>t.id===id);if(!todo)return;
  if(todo.sr)todo.sr.forEach(ref=>{const blks=getDayBlocks(ref.w,ref.d);blks.forEach(b=>{if(b.sts)b.sts=b.sts.filter(s=>s!==id);});setDayBlocks(ref.w,ref.d,blks);});
  todo.done=true;todo.sr=[];sv();el.classList.add('on');celebrate('✓ Done! '+randEnc());setTimeout(()=>rDayPlan(),500);
}
function rmFromSlot(raw,w,d,bi){
  const blocks=getDayBlocks(w,d);if(blocks[bi]&&blocks[bi].sts)blocks[bi].sts=blocks[bi].sts.filter(s=>s!==raw);
  if(!raw.startsWith('tac:')){const todo=D.todos.find(t=>t.id===raw);if(todo&&todo.sr)todo.sr=todo.sr.filter(r=>!(r.w===w&&r.d===d&&r.bs===blocks[bi]?.s));}
  setDayBlocks(w,d,blocks);sv();rDayPlan();
}

function updRepeat(){const rec=document.getElementById('brec').value;if(rec==='none'){document.getElementById('brf').innerHTML='';return;}const wc=periodWeekCount(AP());document.getElementById('brf').innerHTML=`<label class="flbl">Until week</label><select class="minp" id="bru" style="margin-top:0">${Array.from({length:wc},(_,i)=>`<option value="${i}" ${i===wc-1?'selected':''}>${periodWeekLabel(AP(),i)}</option>`).join('')}</select>`;}
function confirmB(){
  const te=document.getElementById('bti');const ee=document.getElementById('ess');
  const title=(te?.value.trim())||BTYPES[pB.t].label;const es=parseInt(ee?.value||pB.s+BTYPES[pB.t].slots);
  const rec=document.getElementById('brec')?.value||'none';const until=parseInt(document.getElementById('bru')?.value??getCW());
  const{w,d,s:si,t}=pB;
  const bObj={t,title,s:si,e:es,sts:[],rec:rec!=='none'};
  const targets=[[w,d]];
  if(rec==='daily'){const wc=periodWeekCount(AP());for(let tw=w;tw<wc&&tw<=until;tw++)for(let td=0;td<7;td++){if(tw===w&&td===d)continue;targets.push([tw,td]);}}
  else if(rec==='weekly'){const wc=periodWeekCount(AP());for(let tw=w+1;tw<wc&&tw<=until;tw++)targets.push([tw,d]);}
  else if(rec==='monthly'){const wc=periodWeekCount(AP());for(let tw=w+4;tw<wc&&tw<=until;tw+=4)targets.push([tw,d]);}
  let added=0;
  targets.forEach(([tw,td])=>{const blks=getDayBlocks(tw,td);if(blks.some(b=>si<b.e&&es>b.s))return;blks.push({...bObj,sts:[]});blks.sort((a,b)=>a.s-b.s);setDayBlocks(tw,td,blks);added++;});
  closeModal();rDayPlan();toast(added>1?`Block added to ${added} days ✓`:'Block added ✓');

    });
  }
}

  blocks.forEach(b=>{const dateObj=ddate(w,d);const sm=b.s*15;const em=b.e*15;const sh=Math.floor(sm/60),smin=sm%60;const eh=Math.floor(em/60),emin=em%60;const st=new Date(dateObj);st.setHours(sh,smin,0);const et=new Date(dateObj);et.setHours(eh,emin,0);const fmt=dt=>dt.toISOString().replace(/[-:]/g,'').split('.')[0]+'Z';ics+=`BEGIN:VEVENT\r\nDTSTART:${fmt(st)}\r\nDTEND:${fmt(et)}\r\nSUMMARY:[${BTYPES[b.t].label}] ${b.title}\r\nEND:VEVENT\r\n`;});

}

function rReview(){
  const p=AP();const cw=getCW();const pw=Math.max(0,cw-1);const psc=weekScore(p,pw);

function openNewPeriodModal(){
  const p=AP();const wc=periodWeekCount(p);
  // New period start = day after last week of current period ends
  const lastWeekStart=periodWeekStart(p,wc-1);const newStart=new Date(lastWeekStart);newStart.setDate(newStart.getDate()+7);
  const fmt=d=>d.toISOString().slice(0,10);
  document.getElementById('modal-ct').innerHTML=`
    <div class="modal-overlay" onclick="closeModal(event)">
      <div class="modal modal-lg" onclick="event.stopPropagation()">
        <div class="mt">Start New 13-Week Period</div>
        <div class="ms">Review your goals below. Check off goals you've completed — they won't carry forward. Uncompleted goals and their tactics carry forward automatically.</div>
        <label class="flbl">New period name</label>
        <input class="minp" type="text" id="np-name" value="${seasonName(new Date(document.getElementById('np-date')?.value||Date.now()))}">
        <label class="flbl">Week 1 start date</label>
        <input class="minp" type="date" id="np-date" value="${fmt(newStart)}" onchange="updateNPName(this.value)">
        <label class="flbl">Planning week before Week 1?</label>
        <select class="minp" id="np-plan" style="margin-top:0"><option value="no">No — Week 1 starts on the date above</option><option value="yes">Yes — add a Planning Week before Week 1</option></select>
        <div style="font-size:12px;font-weight:600;color:var(--t2);margin-top:1rem;margin-bottom:8px">Goals — check off completed ones:</div>
        ${p.goals.map((g,i)=>{const isDone=(p.goalsDone||[]).includes(i);return`<div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--bdr)"><div class="chk ${isDone?'on':''}" id="npg-${i}" onclick="togNPGoal(${i},this)"></div><div style="flex:1;font-size:13px;${isDone?'text-decoration:line-through;color:var(--t3)':''}">${g}</div></div>`;}).join('')}
        <div class="mfooter"><button onclick="closeModal()">Cancel</button><button class="primary" onclick="confirmNewPeriod()">Start new period</button></div>
      </div>
    </div>`;
}
function updateNPName(val){
  if(!val) return;
  const el=document.getElementById('np-name');
  if(el) el.value=seasonName(new Date(val+'T12:00:00'));
}
function togNPGoal(gi,el){const p=AP();if(!p.goalsDone)p.goalsDone=[];const idx=p.goalsDone.indexOf(gi);if(idx>=0)p.goalsDone.splice(idx,1);else p.goalsDone.push(gi);sv();el.classList.toggle('on',p.goalsDone.includes(gi));const label=el.nextElementSibling;if(label)label.style.cssText=p.goalsDone.includes(gi)?'flex:1;font-size:13px;text-decoration:line-through;color:var(--t3)':'flex:1;font-size:13px';}
function confirmNewPeriod(){
  const p=AP();
  const name=document.getElementById('np-name').value.trim()||seasonName(new Date(dateVal+'T12:00:00'));
  const dateVal=document.getElementById('np-date').value;
  const hasPlan=document.getElementById('np-plan').value==='yes';
  if(!dateVal){toast('Please set a start date.');return;}
  const startDate=new Date(dateVal+'T12:00:00');
  // Archive current period (mark as archived)
  p.archived=true;
  // Carry forward incomplete goals and their tactics
  const completedGoals=p.goalsDone||[];
  const newPeriod=createPeriod(name,startDate,hasPlan);
  // Goals: carry uncompleted
  newPeriod.goals=p.goals.filter((_,i)=>!completedGoals.includes(i));
  // Tactics: carry incomplete one-time tactics for carried goals
  const carriedGoalOriginalIndices=p.goals.map((_,i)=>i).filter(i=>!completedGoals.includes(i));
  const newGoalMap={};// old index -> new index
  let ni=0;carriedGoalOriginalIndices.forEach(oi=>{newGoalMap[oi]=ni++;});
  p.tactics.forEach(t=>{
    if(!carriedGoalOriginalIndices.includes(t.gi))return;// goal was completed
    if(t.rec!=='onetime')return;// only carry one-time incomplete
    const done=Object.keys(p.wc).some(k=>k.startsWith(t.id+'_')&&p.wc[k]);
    if(done)return;// already done
    newPeriod.tactics.push({...t,id:'tac-'+Date.now()+Math.random(),gi:newGoalMap[t.gi],carriedTo:hasPlan?1:1,dueWeek:hasPlan?1:1});
  });
  D.periods.push(newPeriod);D.activePeriodId=newPeriod.id;sv();
  closeModal();rToday();toast(`${name} started! 🎉`);celebrate('🚀 New period started! '+randEnc());
}

function rHabits(){
  const p=AP();const cw=getCW();
  const data=getHabitData();
  if(!data.tactics.length){
    document.getElementById('page-habits').innerHTML='<div style="font-size:15px;font-weight:700;margin-bottom:1rem">Habit Tracker</div><div class="empty" style="padding:3rem">No recurring tactics yet. Add daily or weekly tactics in Master Plan to track them here.</div>';
    return;
  }
  const startW=Math.max(1,cw-7);
  const weeks=data.weeks;

  let html='<div style="font-size:15px;font-weight:700;margin-bottom:.25rem">Habit Tracker</div>'
    +'<div style="font-size:12px;color:var(--t2);margin-bottom:1.25rem">Recurring tactics — last 8 weeks. Green = done.</div>';

  // Build grid
  // Header row: week labels
  html+='<div style="overflow-x:auto"><table style="border-collapse:collapse;width:100%">'
    +'<thead><tr>'
      +'<th style="text-align:left;font-size:11px;font-weight:600;color:var(--t3);padding:4px 8px;width:200px">Tactic</th>'
      +weeks.map(function(w){
        const lbl=periodWeekLabel(p,w).replace('Week ','W');
        const isCur=w===cw;
        return'<th style="text-align:center;font-size:11px;font-weight:'+(isCur?'700':'500')+';color:'+(isCur?'var(--green)':'var(--t3)')+';padding:4px 6px;min-width:36px">'+lbl+'</th>';
      }).join('')
    +'</tr></thead>'
    +'<tbody>';

  data.tactics.forEach(function(t){
    // Determine how many days should be done per week
    const isDaily=t.rec==='daily';
    const isWeekly=t.rec==='weekly';

    html+='<tr style="border-bottom:1px solid var(--bdr)">'
      +'<td style="font-size:12px;padding:6px 8px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+t.text+'">'+t.text+(t.time?'<span style="font-size:10px;color:var(--t3);margin-left:4px">'+t.time+'</span>':'')+'</td>';

    weeks.forEach(function(w){
      const isCur=w===cw;
      let done=false;let partial=false;

      if(isDaily){
        // Check all 7 days
        let doneCount=0;
        for(let d=0;d<7;d++)if(isChk(p,t.id,w,d))doneCount++;
        done=doneCount===7;
        partial=doneCount>0&&doneCount<7;
        const pct=Math.round(doneCount/7*100);
        html+='<td style="text-align:center;padding:4px 6px">'
          +'<div style="width:26px;height:26px;border-radius:5px;margin:0 auto;background:'+(done?'var(--green)':partial?'linear-gradient(135deg,var(--green) '+pct+'%,var(--bg2) '+pct+'%)':'var(--bg2)')+';border:1px solid '+(done?'var(--gd)':isCur?'var(--amber)':'var(--bdr)')+';display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:'+(done?'#fff':partial?'var(--gd)':'var(--t3)')+'>'
            +(done?'✓':partial?doneCount:'-')
          +'</div></td>';
      } else if(isWeekly){
        done=isChk(p,t.id,w,t.dow||0);
        html+='<td style="text-align:center;padding:4px 6px">'
          +'<div style="width:26px;height:26px;border-radius:5px;margin:0 auto;background:'+(done?'var(--green)':'var(--bg2)')+';border:1px solid '+(done?'var(--gd)':isCur?'var(--amber)':'var(--bdr)')+';display:flex;align-items:center;justify-content:center;font-size:12px;color:'+(done?'#fff':'var(--t3)')+'>'
            +(done?'✓':'-')
          +'</div></td>';
      }
    });
    html+='</tr>';
  });

  html+='</tbody></table></div>';

  // Summary stats
  const totalWeeks=weeks.length;
  let summary='<div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:1.25rem">';
  data.tactics.forEach(function(t){
    let doneWks=0;
    weeks.forEach(function(w){
      if(t.rec==='weekly'){if(isChk(p,t.id,w,t.dow||0))doneWks++;}
      else{let allDone=true;for(let d=0;d<7;d++)if(!isChk(p,t.id,w,d)){allDone=false;break;}if(allDone)doneWks++;}
    });
    const pct=Math.round(doneWks/totalWeeks*100);
    summary+='<div style="background:#fff;border:1px solid var(--bdr);border-radius:var(--rs);padding:.625rem .875rem;min-width:140px">'
      +'<div style="font-size:12px;font-weight:500;margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:160px" title="'+t.text+'">'+t.text+'</div>'
      +'<div style="font-size:10px;color:var(--t3);margin-bottom:4px">'+t.rec+' · '+doneWks+'/'+totalWeeks+' weeks</div>'
      +'<div class="bar-bg"><div class="bar-fill" style="width:'+pct+'%"></div></div>'
      +'<div style="font-size:11px;color:var(--t3);margin-top:3px">'+pct+'% consistency</div>'
    +'</div>';
  });
  summary+='</div>';
  html+=summary;

  document.getElementById('page-habits').innerHTML=html;
}

// Try to restore session from localStorage token
function tryAutoSignIn() {
  const saved = localStorage.getItem('12wy_gtoken');
  if (saved) {
    try {
      const tok = JSON.parse(saved);
      if (tok.expiry > Date.now()) {
        gToken = tok;
        if (typeof gapi !== 'undefined' && gapi.client) {
          gapi.client.setToken({access_token: gToken.access_token});
        }
        onSignedIn(tok.profile);
        return;
      }
    } catch(e) {}
  }
  initTokenClient();
}

function initTokenClient() {
  if (typeof google === 'undefined') { setTimeout(initTokenClient, 500); return; }
  gTokenClient = google.accounts.oauth2.initTokenClient({
    client_id: GCLIENT_ID,
    scope: GSCOPES,
    callback: onTokenResponse,
    error_callback: function(e) { console.warn('Token error:', e); }
  });
}

function signIn() {
  // If token client not ready yet, init it and retry
  if (!gTokenClient) {
    if (typeof google !== 'undefined') {
      initTokenClient();
      setTimeout(signIn, 800);
    } else {
      setTimeout(signIn, 800);
    }
    return;
  }
  gTokenClient.requestAccessToken({prompt: ''});
}

function onTokenResponse(resp) {
  if (resp.error) { console.warn('Auth error:', resp); return; }
  gapi.client.setToken({access_token: resp.access_token});
  // Fetch user profile
  fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
    headers: {Authorization: 'Bearer ' + resp.access_token}
  }).then(function(r) { return r.json(); }).then(function(profile) {
    const tok = {
      access_token: resp.access_token,
      expiry: Date.now() + (resp.expires_in * 1000),
      profile: profile
    };
    gToken = tok;
    localStorage.setItem('12wy_gtoken', JSON.stringify(tok));
    onSignedIn(profile);
  });
}

function onSignedIn(profile) {
  gUser = profile;
  // Show user bar

// ── DRIVE PERSISTENCE ────────────────────────────────────────
async function loadFromDrive() {
  setSyncStatus('syncing', 'Loading...');
  try {
    // Find existing file
    const list = await gapi.client.drive.files.list({
      spaces: 'appDataFolder',
      q: 'name=\''+DRIVE_FILE_NAME+'\' and trashed=false',
      fields: 'files(id,name)'
    });
    const files = list.result.files || [];
    if (files.length > 0) {
      gDriveFileId = files[0].id;
      const res = await gapi.client.drive.files.get({
        fileId: gDriveFileId,
        alt: 'media'
      });
      const driveData = typeof res.result === 'string' ? JSON.parse(res.result) : res.result;
      // Merge drive data over local — drive wins for most things, keep local todos if newer
      Object.assign(D, driveData);
      CW = D.curWeek && D.curWeek[AP()?.id] !== undefined ? D.curWeek[AP().id] : nowPeriodWeek(AP());
      CD = D.curDay && D.curDay[AP()?.id] !== undefined ? D.curDay[AP().id] : new Date().getDay();
      sv(); // sync back to localStorage
      rToday(); // re-render
      setSyncStatus('synced', '● Synced');
    } else {
      // No file yet — save current local data to Drive
      await saveToDrive();
    }
  } catch(e) {
    console.warn('Drive load error:', e);
    setSyncStatus('error', '⚠ Offline');
  }
}

async function saveToDrive() {
  if (!gToken || !gapiReady) return;
  try {
    const body = JSON.stringify(D);
    const blob = new Blob([body], {type: 'application/json'});
    if (gDriveFileId) {
      // Update existing
      await fetch('https://www.googleapis.com/upload/drive/v3/files/' + gDriveFileId + '?uploadType=media', {
        method: 'PATCH',
        headers: {
          Authorization: 'Bearer ' + gToken.access_token,
          'Content-Type': 'application/json'
        },
        body: body
      });
    } else {
      // Create new in appDataFolder
      const meta = {name: DRIVE_FILE_NAME, parents: ['appDataFolder']};
      const form = new FormData();
      form.append('metadata', new Blob([JSON.stringify(meta)], {type:'application/json'}));
      form.append('file', blob);
      const res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id', {
        method: 'POST',
        headers: {Authorization: 'Bearer ' + gToken.access_token},
        body: form
      });
      const data = await res.json();
      gDriveFileId = data.id;
    }
    setSyncStatus('synced', '● Synced ' + new Date().toLocaleTimeString('en-US', {hour:'numeric',minute:'2-digit'}));
  } catch(e) {
    console.warn('Drive save error:', e);
    setSyncStatus('error', '⚠ Save failed');
  }
}

// ── CALENDAR SYNC ─────────────────────────────────────────────
async function loadCalendars() {
  if (!gToken || !gapiReady) return;
  try {
    const res = await gapi.client.calendar.calendarList.list({minAccessRole: 'reader'});
    const rawCals = res.result.items || [];
    // Filter out non-Google calendar IDs (e.g. Yahoo addresses) that will 404
    const validCals = rawCals.filter(function(c) {
      const id = c.id || '';
      // Skip if it looks like a non-Google email address
      if (id.includes('@yahoo.') || id.includes('@hotmail.') || 
          id.includes('@outlook.') || id.includes('@live.') ||
          id.includes('@icloud.') || id.includes('@me.com')) {
        console.log('Skipping non-Google calendar:', id);
        return false;
      }
      return true;
    });
    gCalendars = validCals.map(function(c) {
      return {
        id: c.id,
        summary: c.summary,
        color: c.backgroundColor || '#1D9E75',
        primary: c.primary || false,
        selected: D.selectedCals ? D.selectedCals.includes(c.id) : c.primary
      };
    });
    // Also clean up any previously saved invalid calendars
    if (D.selectedCals) {
      D.selectedCals = D.selectedCals.filter(function(id) {
        return !id.includes('@yahoo.') && !id.includes('@hotmail.') && 
               !id.includes('@outlook.') && !id.includes('@live.');
      });
    }
    // Default: select all calendars
    if (!D.selectedCals) {
      D.selectedCals = gCalendars.map(function(c) { return c.id; });
      sv();
    }
    renderCalPanel();
    syncCalendarsIn();
  } catch(e) {
    console.warn('Calendar load error:', e);
    setSyncStatus('error', '⚠ Cal error: '+e.message);
  }
}

// Pull Google Calendar events into the planner
async function syncCalendarsIn() {
  if (!gToken) { console.log('syncCalendarsIn: no token'); return; }
  if (!gapiReady) { console.log('syncCalendarsIn: gapi not ready, retrying...'); setTimeout(syncCalendarsIn, 2000); return; }
  if (!gCalendars.length) { console.log('syncCalendarsIn: no calendars yet, loading...'); await loadCalendars(); return; }
  const p = AP();
  const wc = 14;
  let imported = 0;
  const selectedIds = D.selectedCals || gCalendars.filter(function(c){return c.selected;}).map(function(c){return c.id;});
  
  for (let w = 1; w <= 13; w++) {
    const ws = periodWeekStart(p, w);
    const we = new Date(ws); we.setDate(we.getDate() + 7);
    const tMin = ws.toISOString();
    const tMax = we.toISOString();
    if (!D.calEvents) D.calEvents = {};
    if (!D.calEvents[w]) D.calEvents[w] = {};
    
    for (const calId of selectedIds) {
      try {
        const res = await gapi.client.calendar.events.list({
          calendarId: calId,
          timeMin: tMin,
          timeMax: tMax,
          singleEvents: true,
          orderBy: 'startTime',
          maxResults: 50
        });
        const events = res.result.items || [];
        events.forEach(function(ev) {
          if (!ev.start) return;
          const isAllDay = !!ev.start.date;
          const startDt = new Date(ev.start.dateTime || ev.start.date + 'T00:00:00');
          const dayIdx = startDt.getDay();
          if (!D.calEvents[w][dayIdx]) D.calEvents[w][dayIdx] = [];
          // Avoid duplicates
          const exists = D.calEvents[w][dayIdx].some(function(e) { return e.id === ev.id; });
          if (!exists) {
            D.calEvents[w][dayIdx].push({
              id: ev.id,
              title: ev.summary || '(no title)',
              start: ev.start.dateTime || ev.start.date,
              end: ev.end ? (ev.end.dateTime || ev.end.date) : null,
              allDay: isAllDay,
              color: gCalendars.find(function(c){return c.id===calId;})?.color || '#1D9E75',
              calId: calId
            });
            imported++;
          }
        });
      } catch(e) {
        console.warn('Cal sync error for ' + calId, e);
        // If 404, this calendar doesn't exist in Google Calendar — remove it silently
        if (e && e.status === 404) {
          console.log('Removing invalid calendar:', calId);
          if (D.selectedCals) D.selectedCals = D.selectedCals.filter(function(id){return id !== calId;});
          gCalendars = gCalendars.filter(function(c){return c.id !== calId;});
          sv();
        }
      }
    }
  }
  D.lastCalSync = new Date().toISOString();
  sv();
  console.log('Cal sync complete. imported:', imported, 'events stored:', JSON.stringify(Object.keys(D.calEvents||{})));
  // Log week 8 (current week) events for debugging
  const cw = getCW();
  console.log('Events for current week '+cw+':', D.calEvents && D.calEvents[cw] ? JSON.stringify(D.calEvents[cw]) : 'none');
  // Re-render whichever view is active
  const activePage = document.querySelector('.page.active');
  if (activePage) {
    const pid = activePage.id;
    if (pid === 'page-today') rToday();
    else if (pid === 'page-week') {
      if (wSub === 'planner' && document.getElementById('dpc')) {
        rDayPlan(); // refresh planner in-place without rebuilding whole page
      } else {
        rWeek();
      }
    }
  }
}

// Push a block to Google Calendar
async function pushBlockToCalendar(block, w, d) {
  if (!gToken || !gapiReady) return;
  const p = AP();
  const dateObj = ddate(w, d);
  const sm = block.s * 15;
  const em = block.e * 15;
  const sh = Math.floor(sm/60), smin = sm%60;
  const eh = Math.floor(em/60), emin = em%60;
  const start = new Date(dateObj); start.setHours(sh, smin, 0, 0);
  const end = new Date(dateObj); end.setHours(eh, emin, 0, 0);
  const calId = (D.selectedCals && D.selectedCals[0]) || 'primary';
  try {
    const res = await gapi.client.calendar.events.insert({
      calendarId: calId,
      resource: {
        summary: '[' + (BTYPES[block.t]?.label || block.t) + '] ' + block.title,
        start: {dateTime: start.toISOString()},
        end: {dateTime: end.toISOString()},
        description: '12 Week Year · ' + periodWeekLabel(p, w),
        colorId: block.t === 'mit' ? '3' : block.t === 'strategic' ? '1' : block.t === 'buffer' ? '5' : block.t === 'breakout' ? '2' : '8'
      }
    });
    block.gcalEventId = res.result.id;
    sv();
    toast('Added to Google Calendar ✓');
  } catch(e) {
    console.warn('Push to cal error:', e);
  }
}

function requestNotifications() {
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }
}

function notify(title, body, delay) {
  if (!('Notification' in window) || Notification.permission !== 'granted') return;
  if (delay) { setTimeout(function() { notify(title, body); }, delay); return; }
  new Notification(title, {
    body: body,
    icon: 'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📅</text></svg>'
  });
}

function scheduleWeeklyNotifications() {
  if (!('Notification' in window)) return;
  const now = new Date();
  const day = now.getDay(); // 0=Sun,1=Mon
  const hour = now.getHours();
  // Monday morning planning reminder at 8am
  if (day === 1 && hour < 8) {
    const msUntil8 = (new Date(now.getFullYear(),now.getMonth(),now.getDate(),8,0,0) - now);
    notify('12 Week Year — Monday Planning', 'Time to plan your week! Review last week and set your intentions.', msUntil8);
  }
  // Daily one thing reminder at 8:30am
  if (hour < 8) {
    const msUntil830 = (new Date(now.getFullYear(),now.getMonth(),now.getDate(),8,30,0) - now);
    notify('What\'s your One Thing today?', 'Open your planner and set your most important focus for today.', msUntil830);
  }
  // End of day wrap-up at 5pm
  if (hour < 17) {
    const msUntil5 = (new Date(now.getFullYear(),now.getMonth(),now.getDate(),17,0,0) - now);
    notify('12 Week Year — Day Wrap-Up', 'Check your accomplishments and prep for tomorrow.', msUntil5);
  }
}

// ── WEEKLY PLANNING WIZARD ────────────────────────────────────
function openWeeklyWizard() {
  const p = AP();
  const w = getCW();
  const wlabel = periodWeekLabel(p, w);
  const dueTacs = p.tactics.filter(function(t) {
    return (t.rec === 'onetime' && (t.dueWeek === w || t.carriedTo === w)) ||
           t.rec === 'weekly' || t.rec === 'daily' || t.rec === 'ongoing';
  });
  const overdue = p.tactics.filter(function(t) {
    return t.rec === 'onetime' && t.dueWeek && t.dueWeek < w && !tacDoneInWeek(p, t.id, w-1);
  });
  // Get this week's cal events
  const calEventsThisWeek = D.calEvents && D.calEvents[w] ? D.calEvents[w] : {};
  let calHtml = '';
  for (let d = 0; d < 7; d++) {
    const evs = calEventsThisWeek[d] || [];
    const blocks = getDayBlocks(w, d);
    calHtml += '<div style="font-size:11px;font-weight:600;color:var(--t2);margin-top:8px;padding-top:6px;border-top:1px solid var(--bdr)">' + DAYS[d] + '</div>';
    // Build unified list sorted by start time
    const items = [];
    blocks.forEach(function(b) {
      const sm = b.s * 15;
      const em = b.e * 15;
      const sh = Math.floor(sm/60), smin = sm%60;
      const eh = Math.floor(em/60), emin = em%60;
      const fmt = function(h,m){return (h===0?12:h>12?h-12:h)+':'+m.toString().padStart(2,'0')+' '+(h<12?'AM':'PM');};
      const col = b.t==='mit'?'#9B59B6':b.t==='strategic'?'#2D7DD2':b.t==='buffer'?'#F0A500':b.t==='breakout'?'#1D9E75':'#999';
      items.push({sortKey:sm, html:'<div class="cal-event"><div class="cal-dot" style="background:'+col+'"></div><div><div style="font-weight:500">['+BTYPES[b.t].label+'] '+b.title+'</div><div style="color:var(--t3)">'+fmt(sh,smin)+' – '+fmt(eh,emin)+'</div></div></div>'});
    });
    evs.forEach(function(ev) {
      const startDt = new Date(ev.start);
      const sortKey = ev.allDay ? -1 : startDt.getHours()*60+startDt.getMinutes();
      const ts = ev.allDay ? 'All day' : startDt.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
      const te = ev.end&&!ev.allDay ? ' – '+new Date(ev.end).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}) : '';
      items.push({sortKey:sortKey, html:'<div class="cal-event"><div class="cal-dot" style="background:'+ev.color+'"></div><div><div style="font-weight:500">'+ev.title+'</div><div style="color:var(--t3)">'+ts+te+'</div></div></div>'});
    });
    items.sort(function(a,b){return a.sortKey-b.sortKey;});
    if (items.length) {
      items.forEach(function(item){calHtml += item.html;});
    } else {
      calHtml += '<div style="font-size:11px;color:var(--t3);padding:3px 0">No blocks or events</div>';
    }
  }

  document.getElementById('modal-ct').innerHTML =
    '<div class="modal-overlay" onclick="closeModal(event)">'
      + '<div class="modal modal-lg" onclick="event.stopPropagation()" style="max-width:600px;max-height:90vh;overflow-y:auto">'
        + '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem">'
          + '<div style="font-size:16px;font-weight:800">📋 ' + wlabel + ' Planning</div>'
          + '<button onclick="closeModal()" style="background:none;border:none;cursor:pointer;font-size:20px;color:var(--t3)">×</button>'
        + '</div>'

        // Step 1: Intention
        + '<div style="background:var(--gbg);border:1px solid rgba(29,158,117,.2);border-radius:var(--rs);padding:1rem;margin-bottom:1rem">'
          + '<div style="font-size:11px;font-weight:700;color:var(--gd);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px">🎯 Weekly Intention</div>'
          + '<input type="text" id="wiz-intention" value="'+(p.intentions[w]||'')+'" placeholder="This week I am focused on…" style="width:100%;padding:8px 10px;font-size:13px;border-radius:var(--rs);border:1px solid var(--bdr);background:#fff">'
        + '</div>'

        // Step 2: Overdue
        + (overdue.length ? '<div style="background:var(--rbg);border:1px solid rgba(229,62,62,.2);border-radius:var(--rs);padding:1rem;margin-bottom:1rem">'
          + '<div style="font-size:11px;font-weight:700;color:var(--red);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">⚠ ' + overdue.length + ' Overdue Tactic' + (overdue.length>1?'s':'') + ' — Carry Forward?</div>'
          + overdue.map(function(t,i) {
            return '<div style="display:flex;align-items:center;gap:8px;padding:4px 0"><input type="checkbox" id="wiz-od-'+i+'" checked><label for="wiz-od-'+i+'" style="font-size:12px">'+t.text+'</label></div>';
          }).join('')
          + '<button class="btn" style="margin-top:8px;font-size:11px" onclick="wizCarryOverdue('+JSON.stringify(overdue.map(function(t){return t.id;}))+')">Carry selected to '+wlabel+'</button>'
        + '</div>' : '')

        // Step 3: This week's tactics
        + '<div style="margin-bottom:1rem">'
          + '<div style="font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">📌 Tactics This Week (' + dueTacs.length + ')</div>'
          + (dueTacs.length ? dueTacs.map(function(t) {
            const done = tacDoneInWeek(p, t.id, w);
            return '<div style="display:flex;align-items:flex-start;gap:8px;padding:5px 0;border-bottom:1px solid var(--bdr)">'
              + '<div class="chk ' + (done?'on':'') + '" style="pointer-events:none;flex-shrink:0;margin-top:1px"></div>'
              + '<div style="flex:1;font-size:12px;'+(done?'text-decoration:line-through;color:var(--t3)':'')+'">'+t.text+'</div>'
              + '<span class="rb">'+t.rec+'</span>'
            + '</div>';
          }).join('') : '<div class="empty">No tactics yet this week.</div>')
        + '</div>'

        // Step 4: Calendar this week
        + '<div style="margin-bottom:1rem">'
          + '<div style="font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">📅 Your Week at a Glance</div>'
          + calHtml
        + '</div>'

        // Step 5: Week notes
        + '<div style="margin-bottom:1rem">'
          + '<div style="font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px">📝 Week Notes</div>'
          + '<textarea id="wiz-notes" style="width:100%;padding:8px 10px;font-size:13px;border-radius:var(--rs);border:1px solid var(--bdr);background:#fff;resize:vertical;min-height:80px;font-family:inherit" placeholder="Anything else to note for this week…">'+(p.weekNotes&&p.weekNotes[w]?p.weekNotes[w]:'')+'</textarea>'
        + '</div>'

        + '<div class="mfooter">'
          + '<button onclick="closeModal()">Close</button>'
          + '<button class="primary" onclick="saveWizard()">Save & Start Week</button>'
        + '</div>'
      + '</div>'
    + '</div>';
}

function wizCarryOverdue(ids) {
  const p = AP(); const w = getCW();
  ids.forEach(function(id, i) {
    const cb = document.getElementById('wiz-od-' + i);
    if (cb && cb.checked) {
      const t = p.tactics.find(function(x) { return x.id === id; });
      if (t) t.carriedTo = w;
    }
  });
  sv(); toast('Carried forward ✓');
}

function saveWizard() {
  const p = AP(); const w = getCW();
  const intention = document.getElementById('wiz-intention');
  const notes = document.getElementById('wiz-notes');
  if (intention) p.intentions[w] = intention.value.trim();
  if (notes) {
    if (!p.weekNotes) p.weekNotes = {};
    p.weekNotes[w] = notes.value.trim();
  }
  sv(); closeModal();
  toast('Week planned ✓');
  celebrate('📋 ' + periodWeekLabel(p,w) + ' is planned! ' + randEnc());
  rToday();
}

// ── WEEK NOTES IN REVIEW ──────────────────────────────────────
function getWeekNote(w) {
  const p = AP();
  return p.weekNotes && p.weekNotes[w] ? p.weekNotes[w] : '';
}
function saveWeekNote(w, val) {
  const p = AP();
  if (!p.weekNotes) p.weekNotes = {};
  p.weekNotes[w] = val; sv();
}

// ── INIT ──────────────────────────────────────────────────────
window.addEventListener('load', function() {
  // Wait for GAPI to be ready
  function waitForGapi() {
    if (typeof gapi !== 'undefined') {
      initGoogleApis();
    } else {
      setTimeout(waitForGapi, 200);
    }
  }
  waitForGapi();
  initTokenClient();
  requestNotifications();
  scheduleWeeklyNotifications();
  // Request notification permission after short delay
  setTimeout(function() {
    if ('Notification' in window && Notification.permission === 'default') {
      Notification.requestPermission();
    }
  }, 3000);
});

</script>
